services:
  atlas-postgres:
    image: docker.io/library/postgres:17-alpine
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas
    ports: ["5433:5432"]
    volumes: ["atlas-pg-data:/var/lib/postgresql/data"]

  atlas-backend:
    build:
      context: ..
      dockerfile: deploy/Containerfile.server
    command: ["/usr/local/bin/atlas_server"]
    environment:
      DATABASE_URL: "postgres://atlas:atlas@atlas-postgres:5432/atlas?sslmode=disable"
      ATLAS_WEBHOOK_ENC_KEY: "AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA="
      ATLAS_ROOT_PASSWORD: "admin"
      ATLAS_COOKIE_SECURE: "false"
      RUST_LOG: "info,atlas_server=debug"
    depends_on: ["atlas-postgres"]
    volumes: ["atlas-attachments:/app/data/attachments"]

  atlas-mcp:
    build:
      context: ..
      dockerfile: deploy/Containerfile.server
    command: ["/usr/local/bin/atlas_mcp", "--transport", "http", "--bind", "0.0.0.0", "--port", "3001"]
    environment:
      ATLAS_BASE_URL: "http://atlas-backend:8080"
    depends_on: ["atlas-backend"]

  atlas-web:
    build:
      context: ..
      dockerfile: deploy/Containerfile.web
    environment:
      ATLAS_BACKEND_UPSTREAM: "atlas-backend:8080"
      ATLAS_MCP_UPSTREAM: "atlas-mcp:3001"
    ports: ["8088:80"]
    depends_on: ["atlas-backend", "atlas-mcp"]

volumes:
  atlas-pg-data:
  atlas-attachments:
