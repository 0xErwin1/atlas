name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: atlas
          POSTGRES_PASSWORD: atlas
          POSTGRES_DB: atlas_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U atlas -d atlas_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      ATLAS_TEST_DATABASE_URL: postgres://atlas:atlas@localhost:5432/atlas_dev
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96'
      - run: sudo apt-get update && sudo apt-get install -y mold
      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-tests
          cache-targets: true
          cache-on-failure: true
      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest
      - run: cargo nextest run --workspace --locked
      - run: cargo test --doc --workspace --locked
