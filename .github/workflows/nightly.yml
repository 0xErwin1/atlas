name: Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: nightly
  cancel-in-progress: true

jobs:
  # Quality gates. Nothing publishes unless all three pass on this commit.
  style:
    uses: ./.github/workflows/style.yml
  tests:
    uses: ./.github/workflows/tests.yml
  web:
    uses: ./.github/workflows/web.yml

  backend-image:
    needs: [style, tests, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile.server
          push: true
          tags: |
            ghcr.io/0xerwin1/atlas-server:nightly
            ghcr.io/0xerwin1/atlas-server:${{ github.sha }}

  frontend-image:
    needs: [style, tests, web]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile.web
          push: true
          tags: |
            ghcr.io/0xerwin1/atlas-web:nightly
            ghcr.io/0xerwin1/atlas-web:${{ github.sha }}

  desktop-appimage:
    needs: [style, tests, web]
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            mold libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libssl-dev libayatana-appindicator3-dev file
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96'
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # generate_context! embeds the SPA at compile time; tauri.conf.json has no
      # beforeBuildCommand, so build the frontend before the Tauri bundle runs.
      - run: pnpm --filter @atlas/web build

      # The nightly release is rolling: drop it first so each run replaces the
      # tag and its assets instead of accumulating them.
      - name: Reset rolling nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --yes --cleanup-tag --repo ${{ github.repository }} || true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: nightly
          releaseName: Nightly
          prerelease: true
          args: --bundles appimage

  # Pin the published AppImage's hash onto the `nightly` git ref so
  # `atlas-desktop-nightly` installs the prebuilt binary without compiling.
  pin-nightly:
    needs: [backend-image, frontend-image, desktop-appimage]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Download the published AppImage
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download nightly --pattern '*.AppImage' --dir dist
      - name: Pin nightly-info.nix and move the nightly ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          appimage=$(find dist -name '*.AppImage' | head -1)
          name=$(basename "$appimage")
          hash="sha256-$(openssl dgst -sha256 -binary "$appimage" | base64 -w0)"

          cat > nix/nightly-info.nix <<EOF
          # Rolling nightly channel pointer — auto-generated on the \`nightly\` ref
          # by .github/workflows/nightly.yml. The hash matches the AppImage in the
          # current rolling nightly release. Consume via the \`nightly\` ref:
          #   nix run github:${{ github.repository }}/nightly#atlas-desktop-nightly
          {
            url = "https://github.com/${{ github.repository }}/releases/download/nightly/${name}";
            hash = "${hash}";
          }
          EOF

          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add nix/nightly-info.nix
          git commit -m "chore(nightly): pin AppImage hash for $(git rev-parse --short HEAD)"
          git tag -f nightly
          git push origin --force nightly
