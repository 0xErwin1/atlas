name: Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile.server
          push: true
          tags: |
            ghcr.io/0xerwin1/atlas-server:nightly
            ghcr.io/0xerwin1/atlas-server:${{ github.sha }}

  frontend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile.web
          push: true
          tags: |
            ghcr.io/0xerwin1/atlas-web:nightly
            ghcr.io/0xerwin1/atlas-web:${{ github.sha }}

  desktop-appimage:
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev \
            libsoup-3.0-dev libssl-dev libayatana-appindicator3-dev file
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.96'
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      # generate_context! embeds the SPA at compile time; tauri.conf.json has no
      # beforeBuildCommand, so build the frontend before the Tauri bundle runs.
      - run: pnpm --filter @atlas/web build

      # The nightly release is rolling: drop it first so each run replaces the
      # tag and its assets instead of accumulating them.
      - name: Reset rolling nightly release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release delete nightly --yes --cleanup-tag --repo ${{ github.repository }} || true

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          projectPath: apps/desktop/src-tauri
          tagName: nightly
          releaseName: Nightly
          prerelease: true
          args: --bundles appimage
