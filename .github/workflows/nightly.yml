name: Nightly

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  backend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile.server
          push: true
          tags: |
            ghcr.io/0xerwin1/atlas-server:nightly
            ghcr.io/0xerwin1/atlas-server:${{ github.sha }}

  frontend-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Containerfile.web
          push: true
          tags: |
            ghcr.io/0xerwin1/atlas-web:nightly
            ghcr.io/0xerwin1/atlas-web:${{ github.sha }}
