services:
  postgres:
    image: docker.io/pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: atlas
      POSTGRES_DB: atlas_dev
    # Postgres puts parallel-query shared memory in /dev/shm; the 64MB container
    # default exhausts it under parallel test load (errors with SQLSTATE 53100).
    shm_size: 512mb
    ports:
      - '5432:5432'
    volumes:
      - atlas_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U atlas -d atlas_dev']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  atlas_pgdata:
